presets:
  main:
    name: main
    description: main
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1]
          panes:
            - name: postman
              command: tmux-a2a-postman
              delay: 500
              focus: true
            - name: tailscale
              command: sudo $(which tailscaled)
              delay: 500
        - name: vde-monitor
          command: vde-monitor --tailscale
          delay: 500

  dev:
    name: dev
    description: dev
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - name: editor
          command: vim
          delay: 500
          focus: true
        - name: agent
          title: agent
          command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model opus
          delay: 500

  messenger:
    name: messenger
    description: messenger
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - name: editor
          command: vim
          delay: 500
          focus: true
        - name: messenger
          title: messenger
          command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort medium --model sonnet
          delay: 500

  high:
    name: workers
    description: workers
    windowMode: new-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: orchestrator
              title: orchestrator
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model sonnet
              delay: 500
            - name: worker
              title: worker
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model sonnet
              delay: 500
            - name: worker-alt
              title: worker-alt
              command: codex --yolo --add-dir "${SUBDIR}" --config model_reasoning_effort=high --model gpt-5.3-codex
              delay: 500
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: critic
              title: critic
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model sonnet
              delay: 500
            - name: guardian
              title: guardian
              command: codex --yolo --add-dir "${SUBDIR}" --config model_reasoning_effort=high --model gpt-5.4
              delay: 500
            - name: boss
              title: boss
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model opus
              delay: 500

  medium:
    name: workers
    description: workers
    windowMode: new-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: orchestrator
              title: orchestrator
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort medium --model sonnet
              delay: 500
            - name: worker
              title: worker
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort medium --model sonnet
              delay: 500
            - name: worker-alt
              title: worker-alt
              command: codex --yolo --add-dir "${SUBDIR}" --config model_reasoning_effort=medium --model gpt-5.3-codex-spark
              delay: 500
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: critic
              title: critic
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort medium --model sonnet
              delay: 500
            - name: guardian
              title: guardian
              command: codex --yolo --add-dir "${SUBDIR}" --config model_reasoning_effort=medium --model gpt-5.4
              delay: 500
            - name: boss
              title: boss
              command: claude-chill -- claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --effort high --model opus
              delay: 500
