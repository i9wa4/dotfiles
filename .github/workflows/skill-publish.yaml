name: skill-publish
run-name: validate skills for ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]*"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          github_access_token: ${{ github.token }}

      - name: Validate skill frontmatter
        run: bash nix/home-manager/agents/scripts/validate-skill-frontmatter.sh skills/

      - name: Validate skill description lengths (warn-only)
        run: bash nix/home-manager/agents/scripts/validate-skill-description-length.sh skills/
        # To switch to block mode: add env: SKILL_DESC_LENGTH_STRICT: "1"
        # Do so only after fixing the 19 existing over-limit descriptions.

      - name: Validate skills
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix run nixpkgs#gh -- skill publish --dry-run
