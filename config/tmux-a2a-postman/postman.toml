[postman]
allow_shell_templates = true
alert_cooldown_seconds = 600
alert_delivery_window_seconds = 60

# Bounded approval-lane contract:
# Approval route = worker DONE -> orchestrator -> critic -> guardian -> critic
#   -> orchestrator -> boss -> orchestrator -> messenger
# approval pass = no remaining BLOCKING defects and the artifact matches the
#   plan and intended file set
# defect-specific rejection = NOT APPROVED or boss rejection must list the
#   blocking defects for the next worker attempt
# hard iteration cap = 3 approval attempts per artifact (initial + 2 rework
#   attempts)
# watchdog fallback = guardian may end in critic-only fallback after the
#   existing watchdog ladder; never bypass critic or boss
#
# Unresponsive-node boundary by role:
# worker / worker-alt = 900s / 15m
# critic / guardian / messenger / orchestrator = 1800s / 30m
# boss = 3600s / 60m
[boss]
idle_timeout_seconds = 3600
dropped_ball_timeout_seconds = 3600

[critic]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[guardian]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[messenger]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[orchestrator]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[worker]
idle_timeout_seconds = 900
dropped_ball_timeout_seconds = 900

[worker-alt]
idle_timeout_seconds = 900
dropped_ball_timeout_seconds = 900

[agent]
