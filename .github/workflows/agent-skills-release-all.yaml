name: agent-skills-release-all
run-name: ${{ github.event_name }} release-all by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to create for a non-dry-run release, for example agent-skills-v2026.05.21
        required: true
        type: string
      dry_run:
        description: Validate only; do not create a release or publish skills
        required: true
        default: true
        type: boolean
      confirm_release_all:
        description: Type release-all to allow a non-dry-run release
        required: true
        default: ""
        type: string

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-all:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}

      - name: Validate release inputs
        env:
          CONFIRM_RELEASE_ALL: ${{ inputs.confirm_release_all }}
          DRY_RUN: ${{ inputs.dry_run }}
          REF_NAME: ${{ github.ref_name }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -eu

          case "$TAG_NAME" in
          agent-skills-v*) ;;
          *)
            echo "tag_name must begin with agent-skills-v" >&2
            exit 1
            ;;
          esac

          if [ "$DRY_RUN" != "true" ]; then
            if [ "$REF_NAME" != "main" ]; then
              echo "non-dry-run releases must be dispatched from main" >&2
              exit 1
            fi

            if [ "$CONFIRM_RELEASE_ALL" != "release-all" ]; then
              echo "non-dry-run releases require confirm_release_all=release-all" >&2
              exit 1
            fi

            git fetch --tags --force
            if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
              echo "tag already exists: $TAG_NAME" >&2
              exit 1
            fi
          fi

      - name: Validate classification release readiness
        run: bash bin/validate-skill-release-readiness.sh --strict

      - name: Validate trigger results
        run: |
          set -eu
          test -f bin/validate-skill-trigger-matrix.sh
          test -f skills/trigger-validation.json
          bash bin/validate-skill-trigger-matrix.sh --strict-results

      - name: Validate skill publish dry-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: nix run nixpkgs#gh -- skill publish --dry-run

      - name: Publish Agent Skills GitHub Release
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -eu

          if [ "$DRY_RUN" = "true" ]; then
            echo "dry_run=true; skipping skill publishing"
            exit 0
          fi

          nix run nixpkgs#gh -- skill publish --tag "$TAG_NAME"
