# Panes control
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Popup
bind-key g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'GIT_OPTIONAL_LOCKS=0 lazygit'

# Inherit current path
bind-key %      split-window -h -c "#{pane_current_path}"
bind-key '"'    split-window -v -c "#{pane_current_path}"
bind-key c      new-window      -c "#{pane_current_path}"

# Reload config
bind-key I source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Default pane title (override hostname)
set-hook -g after-new-session   'select-pane -T "pane"'
set-hook -g after-new-window    'select-pane -T "pane"'
set-hook -g after-split-window  'select-pane -T "pane"'

# Options
set-option -g default-terminal "tmux-256color"
set-option -g status-keys vi
set-window-option -g mode-keys vi
set-option -g focus-events on
set-option -s escape-time 10
set-option -g history-limit 100000
set-option -sa terminal-features ",*:RGB"

# Bell: passthrough to terminal, tmux stays silent
set-option -g monitor-bell off
set-option -g visual-bell off

# Passthrough (OSC 52 clipboard, bell, etc.)
set-option -g set-clipboard on
set-option -g allow-passthrough on

# Status
set-option -g pane-border-format '> #{pane_id} > ✨#{pane_title} > #{pane_current_command} >'
set-option -g pane-border-status top
set-option -g status 2
set-option -g status-format[1] '#[align=right]#(tmux-a2a-postman get-status-oneline 2>/dev/null)'
set-option -g status-left "#(tmux ls -F'##{session_id}'|sort -V|awk -vs='#{session_id}' '$0==s{print \"[\"NR-1\"]\"}') #{session_name} "
set-option -g status-left-length 50
set-option -g status-position top
set-option -g status-right '#(cd #{pane_current_path} && $HOME/ghq/github.com/i9wa4/dotfiles/bin/repo-status)   #($HOME/ghq/github.com/i9wa4/dotfiles/scripts/tmux/system-load)'
set-option -g status-right-length 200
set-option -g status-style bg=default
set-option -g window-status-current-format '#[bold,underscore][ *#{window_index}#{?window_zoomed_flag,🔎,  }]#[default]'
set-option -g window-status-format '[  #{window_index}#{?window_zoomed_flag,🔎,  }]'
