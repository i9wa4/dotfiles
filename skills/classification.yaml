schema_version: 1
issue: 168
purpose: >
  Machine-readable migration memo for checked-in Agent Skills before any skill
  moves, renames, deletions, or release publishing.

policy:
  release_all_target: true
  selective_release_allowlist: false
  cleanup_lane_issue: 262
  completed_main_branch_baseline: 20e778dd
  issue_worktree_required_for_deferred_cleanup: true
  first_pr_scope:
    - add classification metadata
    - add durable docs pointer
    - add private-content scan checklist
  deferred_changes:
    - skill moves
    - skill renames
    - skill deletions
    - broad postman.md shrinking
    - tags
    - release workflow automation
    - public releases
  deferred_cleanup_lane: >
    After the 20e778dd main-branch baseline, remaining Agent Skills cleanup and
    consolidation work belongs on issue/worktree branches tracked by #262, not
    directly on main.

target_groups:
  agent-harness-engineering: >
    Agent runtime, hooks, postman routing, workspace, prompt contracts, and
    installed-agent engineering.
  agent-skills-management: >
    Agent Skills authoring, validation, Waza readiness, publish dry-runs, and
    catalog diagnostics.
  github: >
    GitHub CLI mechanics, public-surface hygiene, issue and PR operations,
    inline comment rules, and Atlassian (Jira/Confluence) compatibility
    guidance.
  create-review-comment: >
    Thin user-facing PR review-comment drafting trigger.
  subagent-review: >
    Review engine for guardian-led, critic-assisted native reviewer workflows.
  plan-design: >
    Implementation plans, option framing, milestones, approval-readiness
    guidance, and durable task tracking.
  programming: >
    Shell, Python, Nix package workflow, Markdown, implementation-loop
    conventions, and root-cause debugging.
  technical-writing: >
    Technical prose quality, terminology, Vale/Harper checks,
    English-to-Japanese translation workflow, Japanese editorial review,
    AI-slop cleanup, and publication QA guidance.
  data-platform: >
    BigQuery, Databricks, dbt, cloud auth, and data-platform safety guidance.
  diagramming: >
    draw.io and Mermaid authoring, export, and preview workflows.

consolidation_proposal:
  issue: 262
  current_group_count: 13
  target_group_count: 10
  previous_checked_in_skill_count: 29
  target_checked_in_skill_count: 10
  rationale: >
    Three current target_groups each contain only a single skill and are
    conceptually subsumed by an adjacent group. Merging them reduces catalog
    surface area without removing any skills; each migrating skill becomes a
    compatibility_trigger under its new owner group.
  merges:
    - from: atlassian
      to: github
      rationale: >
        Atlassian (Jira/Confluence) is a common companion to GitHub workflows;
        folding it as a compatibility trigger under github avoids a single-skill
        standalone group.
    - from: durable-task-tracking
      to: plan-design
      rationale: >
        Durable task tracking is a coordination and handoff capability that
        extends the plan-design lifecycle; it shares scope with multi-step
        planning and approval handoffs.
    - from: systematic-debugging
      to: programming
      rationale: >
        Root-cause debugging is a programming sub-workflow; once a cause is
        credible the fix loop follows programming conventions. Consolidation
        eliminates a one-skill standalone group.
  implementation_notes: >
    Consolidation implemented on branch issue-262-consolidate-agent-skills-classification
    (#262). Guidance content was moved to the target skill's references/
    directory, target_groups were reduced from 13 to 10, and non-owner
    compatibility skill directories were removed before release. The remaining
    checked-in skill directories are the 10 owner skills. Removed entries remain
    in this classification with publish=false and release_state=removed_before_release
    so release readiness preserves the migration record.

private_content_scan:
  required_before:
    - moving skill content
    - renaming skills
    - demoting skills into references
    - adding release automation
    - creating tags
    - publishing a release
  command: bash scripts/validation/validate-skill-private-content.sh --staged
  path_command: bash scripts/validation/validate-skill-private-content.sh <path>...
  path_scope:
    - scan specific files or skill directories such as skills/<name>
    - reject bare top-level skills because the tree still contains deferred cleanup content
  checklist:
    - home-directory absolute paths
    - private topology or node names that should not be public
    - account-specific authentication or organization details
    - personal machine names or hostnames
    - non-portable local workflow assumptions
    - copied runtime output or generated home-directory files
    - public GitHub surfaces that should use repo-relative paths or stable URLs
  gate_result_field: personal_content_action
  recorded_finding_annotation:
    - 'private-content-scan: allow'
    - 'private-content-scan: allow-next-line'

release_readiness:
  validation_owner: nix/flake-parts/modules/pre-commit.nix
  routine_ci_workflow: .github/workflows/ci.yaml
  release_workflow: .github/workflows/release.yaml
  report_command: bash scripts/validation/validate-skill-release-readiness.sh
  strict_command: bash scripts/validation/validate-skill-release-readiness.sh --strict
  dry_run_command: gh skill publish --dry-run
  dry_run_scope: tag-push release job only
  publish_command: gh skill publish --tag <tag>
  publish_true_requires:
    release_state: release_ready
    personal_content_action: scanned_release_ready
  publish_false_allowed_release_states:
    - demoted_compatibility_trigger
    - removed_before_release
    - release_excluded
  tag_prefix: v
  release_trigger: push tag matching v*

postman_boundary:
  owner_surface: config/tmux-a2a-postman/postman.md
  keep_in_postman_md:
    - node role identity
    - agent-to-agent routing and reply flow
    - approval lane and no-bypass state transitions
    - essential review route and verdict vocabulary
    - human approval gates for public posting
  keep_in_skills_or_references:
    - detailed review procedure
    - reviewer perspectives and synthesis workflow
    - PR review-comment drafting templates
    - AI/human responsibility-boundary placement guidance
    - long runbooks and reusable command examples

common_validation_expectations: &common_validation
  - bash scripts/validation/validate-skill-frontmatter.sh skills
  - bash scripts/validation/validate-skill-private-content.sh --staged
  - bash scripts/validation/validate-skill-description-length.sh --staged
  - bash scripts/validation/validate-skill-waza.sh --staged
  - bash scripts/validation/validate-skill-release-readiness.sh --strict

