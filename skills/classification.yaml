schema_version: 1
issue: 168
purpose: >
  Machine-readable migration memo for checked-in Agent Skills before any skill
  moves, renames, deletions, or release publishing.

policy:
  release_all_target: true
  selective_release_allowlist: false
  first_pr_scope:
    - add classification metadata
    - add durable docs pointer
    - add private-content scan checklist
  deferred_changes:
    - skill moves
    - skill renames
    - skill deletions
    - broad postman.md shrinking
    - tags
    - release workflow automation
    - public releases

target_groups:
  agent-harness-engineering: >
    Agent runtime, hooks, postman routing, workspace, prompt contracts, and
    installed-agent engineering.
  agent-skills-management: >
    Agent Skills authoring, validation, Waza readiness, publish dry-runs, and
    catalog diagnostics.
  github: >
    GitHub CLI mechanics, public-surface hygiene, issue and PR operations, and
    inline comment rules.
  atlassian: >
    Jira and Confluence access with credential-presence checks and
    secret-safe reporting.
  create-review-comment: >
    Thin user-facing PR review-comment drafting trigger.
  subagent-review: >
    Review engine for guardian-led, critic-assisted native reviewer workflows.
  plan-design: >
    Implementation plans, option framing, milestones, and approval-readiness
    guidance.
  durable-task-tracking: >
    Durable task tracking for multi-step, multi-node, or reviewed work with
    checklist/evidence logs and handoff/resume guidance.
  systematic-debugging: >
    Root-cause-first debugging workflow.
  programming: >
    Shell, Python, Nix package workflow, Markdown, and implementation-loop
    conventions.
  english-writing-quality: >
    English documentation quality checks with Vale and Harper for
    technical-doc style, grammar, spelling, false positives, and mixed-doc
    caveats.
  data-platform: >
    BigQuery, Databricks, dbt, cloud auth, and data-platform safety guidance.
  diagramming: >
    draw.io and Mermaid authoring, export, and preview workflows.

retired_skill_surfaces:
  - name: agent-skill-management
    previous_path: skills/agent-skill-management
    previous_docs_pointer: docs/agent-skill-management.md
    action: removed_duplicate_surface
    issue: 206
    canonical_name: agent-skills-management
    canonical_path: skills/agent-skills-management
    canonical_docs_pointer: docs/agent-skills-management.md
    duplicate_reference_removed: references/waza-publishing.md
    rationale: >
      The singular surface duplicated the plural Agent Skills management skill.
      The plural `agent-skills-management` name is the canonical release target.
private_content_scan:
  required_before:
    - moving skill content
    - renaming skills
    - demoting skills into references
    - adding release automation
    - creating tags
    - publishing a release
  command: bash scripts/validation/validate-skill-private-content.sh --staged
  path_command: bash scripts/validation/validate-skill-private-content.sh <path>...
  path_scope:
    - scan specific files or skill directories such as skills/<name>
    - reject bare top-level skills because the tree still contains deferred cleanup content
  checklist:
    - home-directory absolute paths
    - private topology or node names that should not be public
    - account-specific authentication or organization details
    - personal machine names or hostnames
    - non-portable local workflow assumptions
    - copied runtime output or generated home-directory files
    - public GitHub surfaces that should use repo-relative paths or stable URLs
  gate_result_field: personal_content_action
  recorded_finding_annotation:
    - 'private-content-scan: allow'
    - 'private-content-scan: allow-next-line'

postman_boundary:
  owner_surface: config/tmux-a2a-postman/postman.md
  keep_in_postman_md:
    - node role identity
    - agent-to-agent routing and reply flow
    - approval lane and no-bypass state transitions
    - essential review route and verdict vocabulary
    - human approval gates for public posting
  keep_in_skills_or_references:
    - detailed review procedure
    - reviewer perspectives and synthesis workflow
    - PR review-comment drafting templates
    - long runbooks and reusable command examples

common_validation_expectations: &common_validation
  - bash scripts/validation/validate-skill-frontmatter.sh skills
  - bash scripts/validation/validate-skill-private-content.sh --staged
  - bash scripts/validation/validate-skill-description-length.sh --staged
  - bash scripts/validation/validate-skill-waza.sh --staged
  - gh skill publish --dry-run before release

skills:
  - name: agent-harness-engineering
    path: skills/agent-harness-engineering
    publish: true
    scope: repo-local-agent-harness
    action: keep
    target_group: agent-harness-engineering
    target_name: agent-harness-engineering
    release_state: needs_private_content_scan
    owner_surface: skill
    standalone_decision: keep_standalone
    personal_content_action: scan_before_publish
    validation_expectations: *common_validation

  - name: agent-workspace
    path: skills/agent-workspace
    publish: false
    scope: repo-local-agent-harness
    action: demote_to_compatibility_trigger
    target_group: agent-harness-engineering
    target_name: agent-harness-engineering
    release_state: demoted_compatibility_trigger
    owner_surface: skills/agent-harness-engineering/references
    standalone_decision: demoted_to_trigger
    personal_content_action: scanned_migrated_surfaces
    validation_expectations: *common_validation

  - name: orchestrator
    path: skills/orchestrator
    publish: false
    scope: postman-role-contract
    action: delete_role_only_skill
    target_group: agent-harness-engineering
    target_name: agent-harness-engineering
    release_state: removed_before_release
    owner_surface: config/tmux-a2a-postman/postman.md
    runbook_surface: skills/agent-harness-engineering/references/orchestrator-runbook.md
    standalone_decision: deleted_role_only_skill
    personal_content_action: scanned_migrated_surfaces
    validation_expectations:
