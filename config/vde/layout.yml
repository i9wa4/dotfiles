presets:
  main:
    name: main
    description: main control plane, review_first state
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1]
          panes:
            - name: postman
              command: tmux-a2a-postman start  # tmux-a2a-postman control-plane state is review_first
              delay: 500
              focus: true
            - name: tailscale
              command: sudo $(which tailscaled)
              delay: 500
        - type: vertical
          ratio: [1, 1]
          panes:
            - name: agent
              title: agent
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=high
              delay: 500
            - name: vde-monitor
              command: sh -c 'rm -rf -- "$HOME/.vde-monitor/panes" && exec vde-monitor --tailscale'  # startup prunes only disposable pane logs; durable vde-monitor state stays preserved
              delay: 500

  dev:
    name: dev
    description: dev
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - name: pane
          delay: 500
          focus: true
        - name: agent
          title: agent
          command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
          delay: 500

  messenger-codex:
    name: messenger-codex
    description: messenger-codex
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - name: pane
          delay: 500
          focus: true
        - name: messenger
          title: messenger
          command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
          delay: 500

  preset-a:
    name: preset-a
    description: codex-featured team
    windowMode: new-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: orchestrator
              title: orchestrator
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
              delay: 500
            - name: worker
              title: worker
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
              delay: 500
            - name: worker-alt
              title: worker-alt
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
              delay: 500
        - type: vertical
          ratio: [1, 1, 1]
          panes:
            - name: guardian
              title: guardian
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
              delay: 500
            - name: critic
              title: critic
              command: claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --model "opus[1m]" --effort xhigh
              delay: 500
            - name: boss
              title: boss
              command: codex --yolo --add-dir "${SUBDIR}" --model gpt-5.5 --config model_reasoning_effort=xhigh
              delay: 500
