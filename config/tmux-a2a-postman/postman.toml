[postman]
allow_shell_templates = true
alert_cooldown_seconds = 600
alert_delivery_window_seconds = 60

# Unresponsive-node boundary by role:
# worker / worker-alt = 900s / 15m
# critic / guardian / messenger / orchestrator = 1800s / 30m
# boss = 3600s / 60m
[boss]
idle_timeout_seconds = 3600
dropped_ball_timeout_seconds = 3600

[critic]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[guardian]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[messenger]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[orchestrator]
idle_timeout_seconds = 1800
dropped_ball_timeout_seconds = 1800

[worker]
idle_timeout_seconds = 900
dropped_ball_timeout_seconds = 900

[worker-alt]
idle_timeout_seconds = 900
dropped_ball_timeout_seconds = 900
