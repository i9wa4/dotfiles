# Color theme
# Update themes:
#   git clone --depth 1 https://github.com/kovidgoyal/kitty-themes.git /tmp/kitty-themes
#   cp /tmp/kitty-themes/themes/*.conf ./themes/
# include themes/selenized-black.conf
include themes/Monokai_Soda.conf

# Font
font_family      UDEV Gothic 35LG
font_size        16.0
disable_ligatures always

# Opacity
background_opacity         0.70
dynamic_background_opacity yes

# Title bar (transparent, blends with terminal background)
# macOS-only settings are silently ignored on Linux
macos_titlebar_color background

# macOS: Option sends Alt (not special characters)
macos_option_as_alt yes

# Tab bar (hide if only one tab)
tab_bar_min_tabs 2

# Disable all default keybindings
clear_all_shortcuts yes

# Opacity: Opt+a (up), Opt+s (down)
map opt+a set_background_opacity +0.05
map opt+s set_background_opacity -0.05

# Font size: Opt+d (up), Opt+f (down)
map opt+d change_font_size all +1.0
map opt+f change_font_size all -1.0

# Copy / Paste
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Reload config
map cmd+shift+r load_config_file

# Scrollback
map cmd+k clear_terminal scrollback active
