presets:
  main:
    name: main
    description: main
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - type: vertical
          ratio: [1, 1]
          panes:
            - name: postman
              command: tmux-a2a-postman start
              delay: 500
              focus: true
            - name: tailscale
              command: sudo $(which tailscaled)
              delay: 500
        - name: vde-monitor
          command: vde-monitor --tailscale
          delay: 500

  dev:
    name: dev
    description: dev safe default, no unsafe flags
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
      panes:
        - name: editor
          command: vim
          delay: 500
          focus: true
        - name: agent
          title: agent
          command: claude --dangerously-skip-permissions --add-dir "${SUBDIR}" --model "opus[1m]" --effort high  # dev safe default
          delay: 500

  dev-unsafe:
    name: dev-unsafe
    description: dev unsafe opt-in
    windowMode: current-window
    layout:
      type: horizontal
      ratio: [1, 1]
